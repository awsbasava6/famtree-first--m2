services:

  mongo:
    image: mongo
    container_name: famtree-mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db



  frontend:
    build:
      context: ./client

    container_name: famtree-frontend

    ports:
      - "5173:5173"

    volumes:
      - ./client:/app
      - /app/node_modules

    depends_on:
      - backend



  backend:
    build:
      context: ./server

    container_name: famtree-backend

    ports:
      - "5000:5000"

    volumes:
      - ./server:/app
      - /app/node_modules

    env_file:
      - ./server/.env

    depends_on:
      - mongo



volumes:
  mongo-data:
